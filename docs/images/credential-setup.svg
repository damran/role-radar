<svg xmlns="http://www.w3.org/2000/svg" width="940" height="540" viewBox="0 0 940 540" role="img" aria-label="Where to paste your OpenRouter key in n8n">
  <defs>
    <style>
      .t { font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .h { font-size: 26px; font-weight: 800; fill: #11162a; }
      .lbl { font-size: 15px; font-weight: 700; fill: #5b647e; }
      .val { font-size: 17px; font-weight: 600; fill: #11162a; }
      .badge { font-size: 18px; font-weight: 800; fill: #ffffff; }
      .note { font-size: 16px; font-weight: 500; fill: #28304a; }
      .mono { font-family: "Consolas", "SF Mono", monospace; }
      .foot { font-size: 14px; font-weight: 500; fill: #6b7390; }
    </style>
  </defs>

  <rect width="940" height="540" rx="18" fill="#f4f6fb"/>
  <rect x="0" y="0" width="940" height="6" fill="#06b6d4"/>

  <text x="40" y="58" class="t h">🔑 Where to paste your OpenRouter key (one time)</text>

  <!-- credential card -->
  <g>
    <rect x="40" y="86" width="500" height="370" rx="14" fill="#ffffff" stroke="#dfe4f0" stroke-width="2"/>
    <text x="64" y="124" class="t" font-size="18" font-weight="800" fill="#11162a">New credential &#183; Header Auth</text>
    <line x1="64" y1="138" x2="516" y2="138" stroke="#eef1f8" stroke-width="2"/>

    <!-- Name field -->
    <text x="64" y="176" class="t lbl">NAME</text>
    <rect x="64" y="188" width="452" height="50" rx="10" fill="#f7f9fd" stroke="#d3d9e8" stroke-width="2"/>
    <text x="80" y="220" class="t val mono">Authorization</text>

    <!-- Value field -->
    <text x="64" y="276" class="t lbl">VALUE</text>
    <rect x="64" y="288" width="452" height="50" rx="10" fill="#f7f9fd" stroke="#d3d9e8" stroke-width="2"/>
    <text x="80" y="320" class="t val mono">Bearer sk-or-v1-&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;</text>

    <!-- Save -->
    <rect x="64" y="380" width="120" height="46" rx="10" fill="#06b6d4"/>
    <text x="96" y="409" class="t" font-size="17" font-weight="800" fill="#ffffff">Save</text>
  </g>

  <!-- callouts -->
  <g>
    <circle cx="600" cy="205" r="18" fill="#06b6d4"/>
    <text x="594" y="212" class="t badge">1</text>
    <text x="630" y="200" class="t note">Type exactly:</text>
    <text x="630" y="224" class="t note mono" font-weight="700">Authorization</text>

    <circle cx="600" cy="312" r="18" fill="#7c3aed"/>
    <text x="595" y="319" class="t badge">2</text>
    <text x="630" y="300" class="t note">Type <tspan class="mono" font-weight="700">Bearer</tspan> + a space,</text>
    <text x="630" y="324" class="t note">then paste your key from</text>
    <text x="630" y="348" class="t note" fill="#06b6d4" font-weight="700">openrouter.ai/keys</text>

    <circle cx="600" cy="403" r="18" fill="#10b981"/>
    <text x="595" y="410" class="t badge">3</text>
    <text x="630" y="398" class="t note">Click <tspan font-weight="700">Save</tspan>. n8n encrypts it</text>
    <text x="630" y="422" class="t note">&#8212; you only do this once.</text>
  </g>

  <text x="40" y="498" class="t foot">RoleRadar's AI steps use this automatically. Your key never appears in the workflow files you share.</text>
</svg>
